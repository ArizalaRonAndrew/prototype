<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weigh To Go - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
            <div class="logo-area">⚖️👶</div>
            <h2>Weigh To Go Portal</h2>
            <p class="subtitle">Balayan Health & Nutrition</p>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@health.gov.ph" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Access Dashboard</button>
        </form>
    </div>
</body>
</html>
